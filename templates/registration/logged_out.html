{% extends "layout.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow-lg p-4 rounded-4 text-center" style="max-width: 420px; width: 100%;">

        <h2 class="fw-bold mb-3">Logout</h2>
        <p class="text-muted mb-4">
            Are you sure you want to log out of your Fitness Tracker?
        </p>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold rounded-3 shadow-sm">
                Yes, Logout
            </button>
        </form>

        <a href="{% url 'index' %}" class="btn btn-light w-100 py-2 fw-semibold rounded-3 mt-3 border">
            Cancel
        </a>

    </div>
</div>
{% endblock %}
