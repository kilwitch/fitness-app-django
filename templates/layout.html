{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
     <title>
        {% block title %}
        Fitness Tracker
        {% endblock %}
    </title>
    
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'index' %}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'track_list' %}">Track</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'profile_view' %}">Profile</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'charts' %}">Charts</a>
        </li>
        <li class="nav-item">
          <a class="nav-link " href="{% url 'chat_page' %}">Chatbot</a>
        </li>
      </ul>
    
    <div class="ms-auto d-flex align-items-center">
      {% if user.is_authenticated %}
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">
          Logout
        </button>
      </form>
      {%else%}
      <a class="btn btn-primary mx-3" href="{% url 'register' %}">Register</a>
      <a class="btn btn-success" href="{% url 'login' %}">Login</a>
      {% endif %}
    </div>
    </div>
  </div>
</nav>
    <div class="container">
        {% block content %}

        {% endblock %}
    </div>
</body>
</html>
