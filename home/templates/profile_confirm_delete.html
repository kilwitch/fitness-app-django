{% extends "layout.html" %}
{% load static %}

{% block title %}
Delete Profile
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center mt-5">
    <div class="card bg-dark text-white shadow-lg p-4" style="max-width: 450px; width: 100%; border-radius: 16px;">

        <div class="text-center mb-3">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
            <h3 class="mt-3">Confirm Delete</h3>
        </div>

        <p class="text-center mb-4">
            Are you sure you want to delete this Profile?
        </p>

        <ul class="list-group mb-4">
            <li class="list-group-item bg-secondary text-white border-0">
                <strong>Name:</strong> {{ request.user.username }}
            </li>
            </li>
        </ul>

        <form method="post" class="text-center">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100 mb-2">
                Delete Permanently
            </button>

            <a href="{% url 'profile_view' %}" class="btn btn-outline-light w-100">
                Cancel
            </a>
        </form>
    </div>
</div>

{% endblock %}
